<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="main-container">
        <div class="score-container player">
            <p>PLAYER</p>
            <p>0</p>
        </div>
        <div class="buttons-container">
            <button class="rock">
                <img src="./images/rock.png" alt="Rock hand" width="93" height="108">
            </button>
            <button class="paper">
                <img src="./images/paper.png" alt="Paper hand" width="73" height="128">
            </button>
            <button class="scissors">
                <img src="./images/scissors.png" alt="Scissors hand" width="73" height="115">
            </button>
        </div>
        <div class="score-container computer">
            <p>COMPUTER</p>
            <p>0</p>
        </div>
    </div>
    <p class="round-result">Waiting for your choice...</p>
    <script src="script.js"></script>
</body>
</html>
